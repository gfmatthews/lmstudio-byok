name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      changelog:
        description: "Changelog entries (comma or newline separated)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Compile
        run: npm run compile

      - name: Bump version
        id: bump
        run: |
          npm version ${{ inputs.bump }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG.md
        env:
          CHANGELOG_INPUT: ${{ inputs.changelog }}
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          DATE=$(date +%Y-%m-%d)
          # Build the new changelog section
          {
            echo "## [$VERSION] - $DATE"
            echo ""
            echo "$CHANGELOG_INPUT" | tr ',' '\n' | while IFS= read -r line; do
              line=$(echo "$line" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
              [ -z "$line" ] && continue
              # Strip leading "- " or "* " if present, then re-add "- "
              line=$(echo "$line" | sed 's/^[-*][[:space:]]*//')
              echo "- $line"
            done
            echo ""
          } > /tmp/new_section.md
          # Insert after line 3 (after header + description + blank line)
          head -n 3 CHANGELOG.md > /tmp/changelog_new.md
          echo "" >> /tmp/changelog_new.md
          cat /tmp/new_section.md >> /tmp/changelog_new.md
          tail -n +4 CHANGELOG.md >> /tmp/changelog_new.md
          mv /tmp/changelog_new.md CHANGELOG.md

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md
          git commit -m "chore: release v${{ steps.bump.outputs.version }}"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin HEAD --tags

      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGELOG_INPUT: ${{ inputs.changelog }}
        run: |
          # Build release notes from changelog input
          NOTES=$(echo "$CHANGELOG_INPUT" | tr ',' '\n' | while IFS= read -r line; do
            line=$(echo "$line" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            [ -z "$line" ] && continue
            line=$(echo "$line" | sed 's/^[-*][[:space:]]*//')
            echo "- $line"
          done)
          gh release create "v${{ steps.bump.outputs.version }}" \
            *.vsix \
            --title "v${{ steps.bump.outputs.version }}" \
            --notes "$NOTES"

      - name: Publish to Marketplace
        if: env.VSCE_PAT != ''
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish --no-dependencies -p "$VSCE_PAT"
